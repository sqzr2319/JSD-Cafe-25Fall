<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>咖啡厅在线点单</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="canvas-page">
  <main class="canvas-board">
    <aside class="canvas-menu-card">
      <img class="canvas-menu-img" src="/resources/menu.png" alt="菜单" />
    </aside>

    <section class="canvas-right-panel">
      <div class="canvas-poster-wrap">
        <img class="canvas-poster-img" src="/resources/poster.png" alt="海报" />
      </div>

      <div class="canvas-status-grid">
        <article class="canvas-status-card">
          <h2>制作中</h2>
          <div id="preparing-list" class="canvas-list"></div>
        </article>

        <article class="canvas-status-card">
          <h2>配送中</h2>
          <div id="delivery-list" class="canvas-list"></div>
        </article>

        <article class="canvas-status-card">
          <h2>已完成</h2>
          <div id="completed-list" class="canvas-list"></div>
        </article>
      </div>
    </section>
  </main>

  <script src="/canvas.js" type="module"></script>
</body>
</html>
